# Deploys main branch static content to the root of gh-pages branch
name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "gh-pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Deploy to gh-pages root
        run: |
          # Copy site content to temp location
          mkdir -p /tmp/site-content
          cp -r . /tmp/site-content/
          rm -rf /tmp/site-content/.git

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Fetch or create the gh-pages branch
          if git ls-remote --exit-code --heads origin gh-pages > /dev/null 2>&1; then
            git fetch origin gh-pages
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf . > /dev/null 2>&1 || true
          fi

          # Preserve existing PR preview directories
          if [ -d "pr" ]; then
            cp -r pr /tmp/pr-previews
          fi

          # Replace root content with main branch content (except pr/ dir)
          find . -maxdepth 1 ! -name '.git' ! -name 'pr' ! -name '.' -exec rm -rf {} +
          cp -r /tmp/site-content/. .
          rm -rf pr

          # Restore PR preview directories
          if [ -d "/tmp/pr-previews" ]; then
            cp -r /tmp/pr-previews pr
          fi

          git add -A
          git diff --cached --quiet && echo "Nothing to commit" || \
            git commit -m "Deploy main branch to gh-pages [skip ci]"
          git push origin gh-pages
