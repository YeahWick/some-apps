name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: "gh-pages"
  cancel-in-progress: false

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Deploy PR preview to gh-pages
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Copy PR files to a temp location before switching branches
          mkdir -p /tmp/pr-content
          cp -r . /tmp/pr-content/
          rm -rf /tmp/pr-content/.git

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Fetch or create the gh-pages branch
          if git ls-remote --exit-code --heads origin gh-pages > /dev/null 2>&1; then
            git fetch origin gh-pages
            git checkout gh-pages
          else
            # Create orphan gh-pages branch with main branch content as root
            git checkout --orphan gh-pages
            git rm -rf . > /dev/null 2>&1 || true
            # Fetch main branch content for the site root
            git checkout main -- . 2>/dev/null || git checkout master -- . 2>/dev/null || true
            mkdir -p pr
            git add -A
            git commit -m "Initialize gh-pages branch from main"
          fi

          # Replace the PR's preview directory with fresh content
          rm -rf "pr/${PR_NUMBER}"
          mkdir -p "pr/${PR_NUMBER}"
          cp -r /tmp/pr-content/. "pr/${PR_NUMBER}/"

          git add "pr/${PR_NUMBER}"
          git diff --cached --quiet && echo "Nothing to commit" || \
            git commit -m "Deploy preview for PR #${PR_NUMBER} [skip ci]"
          git push origin gh-pages

      - name: Post preview URL as PR comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request.number;
            const owner = context.repo.owner;
            const repo  = context.repo.repo;
            const url   = `https://${owner}.github.io/${repo}/pr/${pr}/`;

            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number: pr,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('PR Preview')
            );

            const body = `## PR Preview\n\n**URL:** [${url}](${url})\n\n_Updated: ${new Date().toUTCString()}_`;

            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number: pr, body,
              });
            }
