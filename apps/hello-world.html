<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World - Final Test PR</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .card {
            background: white;
            padding: 2.5rem;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 350px;
        }
        h1 { color: #333; margin-bottom: 0.5rem; }
        .desc { color: #666; margin-bottom: 1rem; font-size: 0.95rem; }
        .tag {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 12px;
            font-size: 0.75rem;
            text-transform: uppercase;
        }
        .footer {
            margin-top: 1rem;
            font-size: 0.7rem;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Hello World</h1>
        <p class="desc">Final test PR - fresh branch</p>
        <span class="tag">Test PR FINAL</span>
        <div class="footer">Updated successfully via new branch</div>
    </div>
</body>
</html>
