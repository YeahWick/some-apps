<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World - Simple Test PR</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-width: 320px;
        }
        h1 { color: #333; margin: 0 0 0.5rem; }
        p { color: #666; margin: 0 0 1rem; font-size: 0.9rem; }
        .tag {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 12px;
            font-size: 0.75rem;
            text-transform: uppercase;
            margin-bottom: 1rem;
        }
        .footer {
            margin-top: 1rem;
            font-size: 0.7rem;
            color: #999;
        }
        .footer strong {
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Hello World</h1>
        <p>Simple test PR - clean design, no extra effects</p>
        <span class="tag">Test PR v4</span>
        <div class="footer">Updated on branch: <strong>feat/hello-world-pr-test-v4</strong></div>
    </div>
</body>
</html>
