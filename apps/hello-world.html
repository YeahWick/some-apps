<!DOCTYPE html>
<html lang=\"en\">
<head>
    <meta charset=\"UTF-8\">
    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">
    <title>Hello World - Limerick Edition</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Georgia, 'Times New Roman', serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-width: 380px;
        }
        h1 { color: #333; margin: 0 0 1rem; font-size: 1.8rem; }
        .limerick {
            color: #555;
            font-style: italic;
            line-height: 1.6;
            margin: 1rem 0;
            padding: 1rem;
            background: #f8f5ff;
            border-radius: 8px;
            border-left: 4px solid #764ba2;
            text-align: left;
            font-size: 0.95rem;
        }
        .tag {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 12px;
            font-size: 0.75rem;
            text-transform: uppercase;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class=\"card\">
        <h1>Hello World!</h1>
        <div class=\"limerick\">
            There once was a dev from main,<br>
            Who made commits again and again.<br>
            With a limerick twist,<br>
            Their code couldn't resist,<br>
            A poem that ran to the ten.
        </div>
        <span class=\"tag\">Poetic PR</span>
    </div>
</body>
</html>
